name: tasbih_pro
description: "A Professional Tasbih Counter Flutter App."
publish_to: 'none'

# Version Code updated to 5 to push into production smoothly
version: 1.0.4+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  vibration: ^3.1.8
  fl_chart: ^1.2.0
  audioplayers: ^6.0.0
  change_app_package_name: ^1.5.0
  in_app_review: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21 

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/click.mp3
    - assets/images/app_icon.png